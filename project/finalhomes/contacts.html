<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<script type="module" src="https://esm.run/@material/web/all.js"></script>
<link rel="stylesheet" href="./css/site.css">
<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/greenville.css">  
<link rel="stylesheet" href="./css/homes.css">  
<title>Greenville Associates Enterprise Software | UserContacts</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
h5 {font-size: 9pt;}
a, li { font-size: 10pt;}
     .top-section {
    display: flex;
    justify-content: center;
    padding: 20px;
}

#contactForm {
    width: 100%;
    max-width: 800px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px 30px;
}

#contactForm .mb-3 {
    text-align: left;
}

#contactForm button {
    grid-column: span 2; /* button spans both columns */
    justify-self: center;
}

    </style>
</head>
<body>
<div class="containerNEVER" align="center">
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Cocky Remax Mix MLS</a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarMenu"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#" onclick="window.open('contacts.html','_self')">ContactUs</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="#" onclick="showUserView()">Listings</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" onclick="window.open('adminhomes.html','_self')">AdminHomes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" onclick="window.open('admincontacts.html','_self')">AdminContacts</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- USER VIEW -->
<section id="userView" class="container mt-4">
  <h2 class="pageheader">Contact Cocky Remax</h2>
  <div id="homesContainer" class="row g-4"></div>
</section>
    
   
    <section class="top-section" style="width: 90%; height: 600px;">
    <form id="contactForm">
        <div class="mb-3">
            <label>Phone</label>
            <input type="text" class="form-control" name="phone" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" name="email" required>
        </div>

        <div class="mb-3">
            <label>Address 1</label>
            <input type="text" class="form-control" name="address1" required>
        </div>

        <div class="mb-3">
            <label>Address 2</label>
            <input type="text" class="form-control" name="address2">
        </div>

        <div class="mb-3">
            <label>City</label>
            <input type="text" class="form-control" name="city" required>
        </div>

        <div class="mb-3">
            <label>State</label>
            <input type="text" class="form-control" name="state" required>
        </div>

        <div class="mb-3">
            <label>Zip</label>
            <input type="text" class="form-control" name="zip" required>
        </div>

        <div class="mb-3">
            <label>Country</label>
            <input type="text" class="form-control" name="country" required>
        </div>

        <div class="mb-3">
            <label>Fax</label>
            <input type="text" class="form-control" name="fax">
        </div>

        <button type="submit" class="btn btn-custom w-100" style="width: 100px; margin: 0 auto; text-align: center; background-color: black; color: white;">Submit</button>
    </form>
</section>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = Object.fromEntries(new FormData(e.target).entries());

    console.log("Submitting data:", formData);

    try {
        const response = await fetch("https://api242.onrender.com/usercontacts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData)
        });

        const result = await response.json();
        console.log("Server response:", result);
        alert("Form submitted successfully!");
    } catch (error) {
        console.error("Error submitting form:", error);
        alert("There was an error submitting the form.");
    }
});
</script>

</body>
</html>
