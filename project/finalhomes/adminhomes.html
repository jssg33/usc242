<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>
    .detailscontainer {
  background-color: rgba(0, 0, 0, 0.5); /* 50% transparent black */
}

.detailscontainer h3 {
  color: lightgreen;
}

/* Card grid — shown on screens 999px and below */
#propertyCardGrid {
  display: none;
  grid-template-columns: repeat(3, 300px);
  gap: 16px;
  justify-content: center;
  padding: 1rem 0;
}
.prop-card {
  width: 300px;
  height: 300px;
  background: #fff;
  border: 1px solid #dee2e6;
  border-radius: 10px;
  padding: 1rem;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.prop-card-addr { font-size: 15px; font-weight: 600; margin: 0; }
.prop-card-sub  { font-size: 13px; color: #6c757d; margin: 2px 0 0; }
.prop-card-price{ font-size: 20px; font-weight: 600; color: #0d6efd; margin: 8px 0 4px; }
.prop-card-stats{ display: flex; gap: 10px; font-size: 12px; color: #6c757d; flex-wrap: wrap; }
.prop-card-actions { display: flex; flex-wrap: wrap; gap: 5px; }
.prop-card-actions .btn { font-size: 11px; padding: 3px 8px; }

@media (max-width: 999px) {
  .table-responsive-wrapper { display: none; }
  #propertyCardGrid         { display: grid; }
}
    
</style>
</head>
<body class="bg-light">

    <!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Cocky Remax Mix MLS</a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarMenu"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#" onclick="window.open('contacts.html','_self')">ContactUs</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="#" onclick="window.open('index.html','_self')">Listings</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" onclick="window.open('admincontacts.html','_self')">AdminHomes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" onclick="window.open('admincontacts.html','_self')">AdminContacts</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-5 detailscontainer">
    <h3 class="mb-4 text-center">Property Management Dashboard</h3>
    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>Address</th>
                <th>City</th>
                <th>State</th>
                <th>Price</th>
                <th>Beds</th>
                <th>Baths</th>
                <th>Sq Ft</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="propertyTableBody"></tbody>
    </table>
</div>
<div id="propertyCardGrid"></div>
    
<!-- Floor pics modal -->
<div class="modal fade" id="floorPicModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Floor Pictures (URLs)</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="floorPicPropertyId">
        <div class="mb-3">
          <label class="form-label">Enter Floor Picture URLs (one per line, max 5)</label>
          <textarea id="floorPicUrls" class="form-control" rows="6" placeholder="https://example.com/floor1.jpg"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveFloorPics()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- House pics modal -->
<div class="modal fade" id="housePicModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add House Pictures (URLs)</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="housePicPropertyId">
        <div class="mb-3">
          <label class="form-label">Enter House/Exterior Picture URLs (one per line, max 5)</label>
          <textarea id="housePicUrls" class="form-control" rows="6" placeholder="https://example.com/house1.jpg"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveHousePics()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Update property modal (unchanged) -->
<div class="modal fade" id="updatePropertyModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Update Property</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="updatePropertyId">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Street</label><input type="text" id="updStreet" class="form-control"></div>
          <div class="col-md-3"><label class="form-label">City</label><input type="text" id="updCity" class="form-control"></div>
          <div class="col-md-3"><label class="form-label">State</label><input type="text" id="updState" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">Zip Code</label><input type="text" id="updZip" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">Price</label><input type="number" id="updPrice" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">Year Built</label><input type="number" id="updYearBuilt" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">Bedrooms</label><input type="number" id="updBedrooms" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">Bathrooms</label><input type="number" id="updBathrooms" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">Square Feet</label><input type="number" id="updSqFt" class="form-control"></div>
          <div class="col-12"><label class="form-label">Description</label><textarea id="updDescription" class="form-control" rows="3"></textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveUpdatedProperty()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script>
// ---------------------------
// Global properties array
// ---------------------------
let properties = [];

async function loadProperties() {
    try {
        const res = await fetch("https://api242.onrender.com/api/homes");
        properties = await res.json();
        loadTable();
    } catch (err) {
        console.error("Error loading properties:", err);
    }
}

function loadTable() {
    const tbody = document.getElementById("propertyTableBody");
    tbody.innerHTML = "";
    properties.forEach((p, index) => {
        const row = `
            <tr>
                <td>${p.address.street}</td>
                <td>${p.address.city}</td>
                <td>${p.address.state}</td>
                <td>$${p.price.toLocaleString()}</td>
                <td>${p.floorPlan?.bedrooms || ''}</td>
                <td>${p.floorPlan?.bathrooms || ''}</td>
                <td>${p.floorPlan?.squareFeet || ''}</td>
                <td>
                    <button class="btn btn-primary btn-sm" onclick="updateRecord(${index})">Update</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteRecord(${index})">Delete</button>
                    <button class="btn btn-warning btn-sm" onclick="addFloorPics(${index})">Add Floor Pics</button>
                    <button class="btn btn-info btn-sm" onclick="addHousePics(${index})">Add House Pics</button>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
}

// ======================
// Picture Functions (Updated)
// ======================

async function saveFloorPics() {
    const id = document.getElementById("floorPicPropertyId").value;
    const urlInput = document.getElementById("floorPicUrls").value.trim();

    if (!urlInput) return alert("Please enter at least one URL");

    const urls = urlInput.split("\n")
        .map(line => line.trim())
        .filter(url => url.length > 0);

    if (urls.length > 5) return alert("Maximum 5 URLs allowed");

    try {
        // Fetch current property
        const res = await fetch(`https://api242.onrender.com/api/homes/${id}`);
        const property = await res.json();

        // Add new URLs to existing floorPics array (or create it)
        property.floorPics = [...(property.floorPics || []), ...urls];

        // Update the full record
        const updateRes = await fetch(`https://api242.onrender.com/api/homes/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(property)
        });

        if (updateRes.ok) {
            alert("Floor pictures added successfully!");
            const modal = bootstrap.Modal.getInstance(document.getElementById("floorPicModal"));
            modal.hide();
            loadProperties(); // refresh table
        } else {
            alert("Failed to update property");
        }
    } catch (err) {
        console.error(err);
        alert("Error: " + err.message);
    }
}

async function saveHousePics() {
    const id = document.getElementById("housePicPropertyId").value;
    const urlInput = document.getElementById("housePicUrls").value.trim();

    if (!urlInput) return alert("Please enter at least one URL");

    const urls = urlInput.split("\n")
        .map(line => line.trim())
        .filter(url => url.length > 0);

    if (urls.length > 5) return alert("Maximum 5 URLs allowed");

    try {
        const res = await fetch(`https://api242.onrender.com/api/homes/${id}`);
        const property = await res.json();

        property.housePics = [...(property.housePics || []), ...urls];

        const updateRes = await fetch(`https://api242.onrender.com/api/homes/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(property)
        });

        if (updateRes.ok) {
            alert("House pictures added successfully!");
            const modal = bootstrap.Modal.getInstance(document.getElementById("housePicModal"));
            modal.hide();
            loadProperties(); // refresh
        } else {
            alert("Failed to update property");
        }
    } catch (err) {
        console.error(err);
        alert("Error: " + err.message);
    }
}

// Other functions (updateRecord, deleteRecord, etc.) remain the same
function updateRecord(index) { /* ... unchanged ... */ }
function deleteRecord(index) { /* ... unchanged ... */ }
function addFloorPics(index) {
    document.getElementById("floorPicPropertyId").value = properties[index]._id;
    document.getElementById("floorPicUrls").value = ""; // clear previous input
    new bootstrap.Modal(document.getElementById("floorPicModal")).show();
}
function addHousePics(index) {
    document.getElementById("housePicPropertyId").value = properties[index]._id;
    document.getElementById("housePicUrls").value = "";
    new bootstrap.Modal(document.getElementById("housePicModal")).show();
}

// Load on start
loadProperties();
</script>
</body>
</html>
