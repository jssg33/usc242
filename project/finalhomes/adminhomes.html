<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Manager</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">   
  <link href="./css/homes.css" rel="stylesheet"/>
</script>
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4 text-center">Property Management Dashboard</h1>
    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>Address</th>
                <th>City</th>
                <th>State</th>
                <th>Price</th>
                <th>Beds</th>
                <th>Baths</th>
                <th>Sq Ft</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="propertyTableBody"></tbody>
    </table>
</div>

<!-- Floor pics modal (unchanged) -->
<div class="modal fade" id="floorPicModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Floor Plan Pictures</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="floorPicPropertyId">
        <div class="mb-3">
          <label class="form-label">Upload Floor Pictures</label>
          <input type="file" id="floorPicFiles" class="form-control" multiple>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveFloorPics()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- House pics modal (unchanged) -->
<div class="modal fade" id="housePicModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add House Pictures</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="housePicPropertyId">
        <div class="mb-3">
          <label class="form-label">Upload House Pictures</label>
          <input type="file" id="housePicFiles" class="form-control" multiple>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveHousePics()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Update property modal (unchanged) -->
<div class="modal fade" id="updatePropertyModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Update Property</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="updatePropertyId">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Street</label>
            <input type="text" id="updStreet" class="form-control">
          </div>
          <div class="col-md-3">
            <label class="form-label">City</label>
            <input type="text" id="updCity" class="form-control">
          </div>
          <div class="col-md-3">
            <label class="form-label">State</label>
            <input type="text" id="updState" class="form-control">
          </div>
          <div class="col-md-4">
            <label class="form-label">Zip Code</label>
            <input type="text" id="updZip" class="form-control">
          </div>
          <div class="col-md-4">
            <label class="form-label">Price</label>
            <input type="number" id="updPrice" class="form-control">
          </div>
          <div class="col-md-4">
            <label class="form-label">Year Built</label>
            <input type="number" id="updYearBuilt" class="form-control">
          </div>
          <div class="col-md-4">
            <label class="form-label">Bedrooms</label>
            <input type="number" id="updBedrooms" class="form-control">
          </div>
          <div class="col-md-4">
            <label class="form-label">Bathrooms</label>
            <input type="number" id="updBathrooms" class="form-control">
          </div>
          <div class="col-md-4">
            <label class="form-label">Square Feet</label>
            <input type="number" id="updSqFt" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label">Description</label>
            <textarea id="updDescription" class="form-control" rows="3"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveUpdatedProperty()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script>
// ---------------------------
// Your JSON Data Goes Here
// ---------------------------
let properties = [];

async function loadProperties() {
    try {
        const res = await fetch("https://api242.onrender.com/api/homes");
        properties = await res.json();
        loadTable();
    } catch (err) {
        console.error("Error loading properties:", err);
        loadTable(); // still render empty table
    }
}

// ---------------------------
// Render Table Rows
// ---------------------------
function loadTable() {
    const tbody = document.getElementById("propertyTableBody");
    tbody.innerHTML = "";
    properties.forEach((p, index) => {
        const row = `
            <tr>
                <td>${p.address.street}</td>
                <td>${p.address.city}</td>
                <td>${p.address.state}</td>
                <td>$${p.price.toLocaleString()}</td>
                <td>${p.floorPlan.bedrooms}</td>
                <td>${p.floorPlan.bathrooms}</td>
                <td>${p.floorPlan.squareFeet}</td>
                <td>
                    <button class="btn btn-primary btn-sm" onclick="updateRecord(${index})">Update</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteRecord(${index})">Delete</button>
                    <button class="btn btn-warning btn-sm" onclick="addFloorPics(${index})">Add Floor Pics</button>
                    <button class="btn btn-info btn-sm" onclick="addHousePics(${index})">Add House Pics</button>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
}

// ---------------------------
// Action Button Handlers
// ---------------------------
function updateRecord(index) {
    const p = properties[index];
    document.getElementById("updatePropertyId").value = p._id;
    document.getElementById("updStreet").value = p.address.street;
    document.getElementById("updCity").value = p.address.city;
    document.getElementById("updState").value = p.address.state;
    document.getElementById("updZip").value = p.address.zipCode;
    document.getElementById("updPrice").value = p.price;
    document.getElementById("updYearBuilt").value = p.yearBuilt;
    document.getElementById("updBedrooms").value = p.floorPlan.bedrooms;
    document.getElementById("updBathrooms").value = p.floorPlan.bathrooms;
    document.getElementById("updSqFt").value = p.floorPlan.squareFeet;
    document.getElementById("updDescription").value = p.description;

    const modal = new bootstrap.Modal(document.getElementById("updatePropertyModal"));
    modal.show();
}

function deleteRecord(index) {
    if (!confirm("Delete property " + properties[index]._id + "?")) return;
    alert("Delete record: " + properties[index]._id);
    // TODO: API call
}

function addFloorPics(index) {
    const property = properties[index];
    document.getElementById("floorPicPropertyId").value = property._id;
    const modal = new bootstrap.Modal(document.getElementById("floorPicModal"));
    modal.show();
}

function addHousePics(index) {
    const property = properties[index];
    document.getElementById("housePicPropertyId").value = property._id;
    const modal = new bootstrap.Modal(document.getElementById("housePicModal"));
    modal.show();
}

function saveFloorPics() {
    const id = document.getElementById("floorPicPropertyId").value;
    const files = document.getElementById("floorPicFiles").files;
    if (!files.length) return alert("Select at least one file");

    const formData = new FormData();
    formData.append("propertyId", id);
    for (let file of files) {
        formData.append("floorPics", file); // backend expects this key
    }

    // TODO: Replace with real fetch (example)
    fetch("https://api242.onrender.com/api/homes/" + id + "/floor-pics", {
        method: "POST",
        body: formData
    })
    .then(() => {
        alert("Floor pictures uploaded for property " + id);
        const modal = bootstrap.Modal.getInstance(document.getElementById("floorPicModal"));
        if (modal) modal.hide();
    })
    .catch(err => alert("Upload failed: " + err));
}

function saveHousePics() {
    const id = document.getElementById("housePicPropertyId").value;
    const files = document.getElementById("housePicFiles").files;
    if (!files.length) return alert("Select at least one file");

    const formData = new FormData();
    formData.append("propertyId", id);
    for (let file of files) {
        formData.append("housePics", file);
    }

    fetch("https://api242.onrender.com/api/homes/" + id + "/house-pics", {
        method: "POST",
        body: formData
    })
    .then(() => {
        alert("House pictures uploaded for property " + id);
        const modal = bootstrap.Modal.getInstance(document.getElementById("housePicModal"));
        if (modal) modal.hide();
    })
    .catch(err => alert("Upload failed: " + err));
}

function saveUpdatedProperty() {
    const id = document.getElementById("updatePropertyId").value;
    const updated = {
        street: document.getElementById("updStreet").value,
        city: document.getElementById("updCity").value,
        state: document.getElementById("updState").value,
        zipCode: document.getElementById("updZip").value,
        price: Number(document.getElementById("updPrice").value),
        yearBuilt: Number(document.getElementById("updYearBuilt").value),
        bedrooms: Number(document.getElementById("updBedrooms").value),
        bathrooms: Number(document.getElementById("updBathrooms").value),
        squareFeet: Number(document.getElementById("updSqFt").value),
        description: document.getElementById("updDescription").value
    };

    fetch("https://api242.onrender.com/api/homes/" + id, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(updated)
    })
    .then(() => {
        alert("Property updated: " + id);
        const modal = bootstrap.Modal.getInstance(document.getElementById("updatePropertyModal"));
        if (modal) modal.hide();
    })
    .catch(err => alert("Update failed: " + err));
}

// Call once everything is loaded
loadProperties();
</script>
</body>
</html>
