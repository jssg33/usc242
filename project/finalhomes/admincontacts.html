</head>
<body>

    <a class="navbar-brand" href="#">Cocky Remax Mix MLS</a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarMenu"

    </button>

    <div class="collapse navbar-collapse" id="navbarMenu">
      <ul class="navbar-nav ms-auto">

<!-- USER VIEW -->
<section id="userView" class="container mt-4">
  <h2 class="pageheader">AdminContacts</h2>
  <div id="homesContainer" class="row g-4"></div>
</section>
	
  <div class="container py-5">
        <div id="contactsContainer" class="accordion"></div>
  </div>

<div class="modal fade" id="updateModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Update Contact</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="updateForm">
          <input type="hidden" id="contactId">

          <label class="form-label">Phone</label>
          <input class="form-control" id="contactPhone">

          <label class="form-label mt-2">Email</label>
          <input class="form-control" id="contactEmail">

          <label class="form-label mt-2">Address 1</label>
          <input class="form-control" id="contactAddress1">

          <label class="form-label mt-2">Address 2</label>
          <input class="form-control" id="contactAddress2">

          <label class="form-label mt-2">City</label>
          <input class="form-control" id="contactCity">

          <label class="form-label mt-2">ZIP</label>
          <input class="form-control" id="contactZip">

          <label class="form-label mt-2">Fax</label>
          <input class="form-control" id="contactFax">
        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="submitUpdate()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script>
async function loadContacts() {
  const container = document.getElementById("contactsContainer");

  try {
    const response = await fetch("https://api242.onrender.com/usercontacts");
    const data = await response.json();

    // Group by state
    const grouped = data.reduce((acc, contact) => {
      const state = contact.state || "Unknown";
      if (!acc[state]) acc[state] = [];
      acc[state].push(contact);
      return acc;
    }, {});

    const sortedStates = Object.keys(grouped).sort();

    container.innerHTML = ""; // clear old content

    sortedStates.forEach((state, index) => {
      const contacts = grouped[state];

      const itemId = `collapse${index}`;
      const headerId = `heading${index}`;

      const card = document.createElement("div");
      card.className = "accordion-item";

      card.innerHTML = `
        <h2 class="accordion-header" id="${headerId}">
          <button class="accordion-button collapsed" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#${itemId}"
            aria-expanded="false"
            aria-controls="${itemId}">
            ${state} (${contacts.length})
          </button>
        </h2>

        <div id="${itemId}" class="accordion-collapse collapse"
          aria-labelledby="${headerId}"
          data-bs-parent="#contactsContainer">
          <div class="accordion-body">
            <div class="table-responsive">
              <table class="table table-striped table-bordered">
                <thead class="table-dark">
                  <tr>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Address</th>
                    <th>City</th>
                    <th>ZIP</th>
                    <th>Fax</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  ${contacts
                    .map(c => {
                      const encoded = encodeURIComponent(JSON.stringify(c));
                      return `
                        <tr>
                          <td>${c.phone || ""}</td>
                          <td>${c.email || ""}</td>
                          <td>${c.address1 || ""} ${c.address2 || ""}</td>
                          <td>${c.city || ""}</td>
                          <td>${c.zip || ""}</td>
                          <td>${c.fax || ""}</td>
                          <td>
                            <button class="btn btn-sm btn-primary" onclick="openUpdateModal('${encoded}')">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="requestDelete('${c._id}')">Delete</button>
                          </td>
                        </tr>`;
                    })
                    .join("")}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;

      container.appendChild(card);
    });
  } catch (err) {
    container.innerHTML =
      `<div class="alert alert-danger">Failed to load contacts.</div>`;
    console.error(err);
  }
}

loadContacts();

function openUpdateModal(encodedContact) {
  const contact = JSON.parse(decodeURIComponent(encodedContact));

  document.getElementById("contactId").value = contact._id;
  document.getElementById("contactPhone").value = contact.phone || "";
  document.getElementById("contactEmail").value = contact.email || "";
  document.getElementById("contactAddress1").value = contact.address1 || "";
  document.getElementById("contactAddress2").value = contact.address2 || "";
  document.getElementById("contactCity").value = contact.city || "";
  document.getElementById("contactZip").value = contact.zip || "";
  document.getElementById("contactFax").value = contact.fax || "";

  const modal = new bootstrap.Modal(document.getElementById("updateModal"));
  modal.show();
}

async function submitUpdate() {
  const id = document.getElementById("contactId").value;

  const updated = {
    phone: document.getElementById("contactPhone").value,
    email: document.getElementById("contactEmail").value,
    address1: document.getElementById("contactAddress1").value,
    address2: document.getElementById("contactAddress2").value,
    city: document.getElementById("contactCity").value,
    zip: document.getElementById("contactZip").value,
    fax: document.getElementById("contactFax").value
  };

  await fetch(`https://api242.onrender.com/usercontacts/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(updated)
  });

  location.reload();
}

async function requestDelete(id) {
  if (!confirm("Are you sure you want to delete this contact?")) return;

  await fetch(`https://api242.onrender.com/usercontacts/${id}`, {
    method: "DELETE"
  });

  location.reload();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
