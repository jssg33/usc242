<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Realtor Site</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link href="./css/homes.css" rel="stylesheet"/>
  <style>
    
  </style>
</head>

<body>

<!-- PROPERTY DETAILS MODAL -->
      <div class="modal fade" id="detailsModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Property Details</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div id="detailsContent"></div>
      </div>

    </div>
  </div>
</div>

 <!-- ⭐⭐⭐ NEW MODALS ADDED BELOW ⭐⭐⭐ -->

  <!-- REALTOR INFO MODAL -->
  <div class="modal fade" id="realtorModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Update Realtor Info</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <form id="realtorForm">
            <input type="hidden" id="realtorId">

            <label class="form-label">Username</label>
            <input type="text" id="realtorUsername" class="form-control mb-2">

            <label class="form-label">Reseller Name</label>
            <input type="text" id="realtorReseller" class="form-control mb-2">

            <label class="form-label">Email</label>
            <input type="email" id="realtorEmail" class="form-control mb-2">

            <label class="form-label">Phone</label>
            <input type="text" id="realtorPhone" class="form-control mb-2">

            <button type="submit" class="btn btn-primary w-100 mt-3">Save</button>
          </form>
        </div>

      </div>
    </div>
  </div>

  <!-- PROPERTY INFO MODAL -->
  <div class="modal fade" id="propertyModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Update Property Info</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <form id="propertyForm">
            <input type="hidden" id="propertyId">

            <label class="form-label">Price</label>
            <input type="number" id="propertyPrice" class="form-control mb-2">

            <label class="form-label">Status</label>
            <select id="propertyStatus" class="form-select mb-2">
              <option value="available">Available</option>
              <option value="pending">Pending</option>
              <option value="sold">Sold</option>
            </select>

            <label class="form-label">Bedrooms</label>
            <input type="number" id="propertyBedrooms" class="form-control mb-2">

            <label class="form-label">Bathrooms</label>
            <input type="number" id="propertyBathrooms" class="form-control mb-2">

            <label class="form-label">Square Feet</label>
            <input type="number" id="propertySqft" class="form-control mb-2">

            <button type="submit" class="btn btn-primary w-100 mt-3">Save</button>
          </form>
        </div>

      

        
      </div>
    </div>
  </div>

  <!-- END MODALS -->
  
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Cocky Remax Mix MLS</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarMenu"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="#" onclick="showUserView()">Listings</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="showAdminPage()">Admin</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- USER VIEW -->
  <section id="userView" class="container mt-4">
    <h2 class="pageheader">Featured Homes</h2>
    <div id="homesContainer" class="row g-4"></div>
  </section>

  <!-- ADMIN PAGE -->
  <section id="adminPage" class="container mt-4">
    <h2 class="text-center mb-4">Admin Panel</h2>

    <table class="table table-striped table-bordered">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Address</th>
          <th>Price</th>
          <th>Status</th>
          <th>Bedrooms</th>
          <th>Bathrooms</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="adminTableBody"></tbody>
    </table>
  </section>

 
  <br><br><br><br><br>
  <footer style="width: '100%'; background-color: black; color: white; text-align: center;">
    <div align="center" style="text-align: center; background-color: black; color: white; position: absolute; bottom: 0; height: 50; margin-top: 50; width: "100%";">
        Cocky Realtors, Inc &copy2026
    </div>
  </footer>

  <!-- App Logic -->
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
