<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Realtor Site</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background-color: #f8f9fa;
    }
    .home-card img {
      height: 200px;
      object-fit: cover;
    }
    #adminPage {
      display: none;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">RealtorMock</a>

      <!-- Hamburger -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarMenu"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="#" onclick="showUserView()">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="showAdminPage()">Admin</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- USER VIEW -->
  <section id="userView" class="container mt-4">
    <h2 class="text-center mb-4">Featured Homes</h2>
    <div id="homesContainer" class="row g-4"></div>
  </section>

  <!-- ADMIN PAGE -->
  <section id="adminPage" class="container mt-4">
    <h2 class="text-center mb-4">Admin Panel</h2>

    <table class="table table-striped table-bordered">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Address</th>
          <th>Price</th>
          <th>Status</th>
          <th>Bedrooms</th>
          <th>Bathrooms</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="adminTableBody"></tbody>
    </table>
  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App Logic -->
  <script src="app.js"></script>
</body>
</html>
