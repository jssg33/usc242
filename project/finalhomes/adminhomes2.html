<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Manager</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >
</head>
<script>
function addFloorPics(index) {
    const property = properties[index];
    document.getElementById("floorPicPropertyId").value = property._id;

    const modal = new bootstrap.Modal(document.getElementById("floorPicModal"));
    modal.show();
}

function addHousePics(index) {
    const property = properties[index];
    document.getElementById("housePicPropertyId").value = property._id;

    const modal = new bootstrap.Modal(document.getElementById("housePicModal"));
    modal.show();
}

function saveFloorPics() {
    const id = document.getElementById("floorPicPropertyId").value;
    const files = document.getElementById("floorPicFiles").files;

    console.log("Uploading floor pics for:", id, files);

    // TODO: Replace with your API call
    alert("Floor pictures uploaded for property " + id);
}

function saveHousePics() {
    const id = document.getElementById("housePicPropertyId").value;
    const files = document.getElementById("housePicFiles").files;

    console.log("Uploading house pics for:", id, files);

    // TODO: Replace with your API call
    alert("House pictures uploaded for property " + id);
}
</script>
<body class="bg-light">

<div class="container py-5">
    <h1 class="mb-4 text-center">Property Management Dashboard</h1>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>Address</th>
                <th>City</th>
                <th>State</th>
                <th>Price</th>
                <th>Beds</th>
                <th>Baths</th>
                <th>Sq Ft</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="propertyTableBody">
            <!-- Rows inserted dynamically -->
        </tbody>
    </table>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ---------------------------
// Your JSON Data Goes Here
// ---------------------------
const properties = YOUR_JSON_DATA_HERE;

// ---------------------------
// Render Table Rows
// ---------------------------
function loadTable() {
    const tbody = document.getElementById("propertyTableBody");
    tbody.innerHTML = "";

    properties.forEach((p, index) => {
        const row = `
            <tr>
                <td>${p.address.street}</td>
                <td>${p.address.city}</td>
                <td>${p.address.state}</td>
                <td>$${p.price.toLocaleString()}</td>
                <td>${p.floorPlan.bedrooms}</td>
                <td>${p.floorPlan.bathrooms}</td>
                <td>${p.floorPlan.squareFeet}</td>
                <td>
                    <button class="btn btn-primary btn-sm" onclick="updateRecord(${index})">Update</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteRecord(${index})">Delete</button>
                    <button class="btn btn-warning btn-sm" onclick="addFloorPics(${index})">Add Floor Pics</button>
                    <button class="btn btn-info btn-sm" onclick="addHousePics(${index})">Add House Pics</button>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
}

// ---------------------------
// Action Button Handlers
// ---------------------------
function updateRecord(index) {
    alert("Update record: " + properties[index]._id);
}

function deleteRecord(index) {
    alert("Delete record: " + properties[index]._id);
}

function addFloorPics(index) {
    alert("Add floor pictures for: " + properties[index]._id);
}

function addHousePics(index) {
    alert("Add house pictures for: " + properties[index]._id);
}

// Load table on page load
loadTable();
</script>

</body>
</html>
