<html>
<head>
    <title>Movie Parser</title>
</head>
<body>

<div id="movieresults">
    <ul id="nowplaying"></ul>
</div>

<button onclick="getmovies()">Get Movies</button>

<script>
async function getmovies() {
    try {
        const response = await fetch("https://jssg33.github.io/usc242/project/part7/data/class.json");
        const data = await response.json();
        console.log("Loaded data:", data);

        const ul = document.getElementById("nowplaying");
        ul.innerHTML = ""; // clear old results

        data.forEach(movie => {
            const li = document.createElement("li");
            li.textContent = movie.moviename + "," movie.rating + "," + movie.runtime;
            li.style.fontStyle = "normal"; // remove italics if needed
            ul.appendChild(li);
        });

    } catch (error) {
        console.error("Error loading movies:", error);
    }
}

</script>

</body>
</html>
